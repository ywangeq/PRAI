<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>添加 Paper</title>
  <style>
    :root {
      --bg: #f5f3ea;
      --panel: rgba(255,255,255,0.92);
      --ink: #202933;
      --muted: #6a756f;
      --line: rgba(83,96,86,0.18);
      --accent: #0f766e;
      --soft: rgba(24,168,155,0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px 22px 56px;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.08;
    }
    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 820px;
      line-height: 1.7;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(380px, 460px) minmax(0, 1fr);
      gap: 18px;
      margin-top: 22px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      padding: 10px 12px;
    }
    textarea { min-height: 92px; resize: vertical; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfa;
      margin-bottom: 12px;
    }
    .card h3, .card h4 {
      margin: 0 0 8px;
    }
    .pill {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: #087c73;
      font-size: 12px;
      font-weight: 700;
      margin: 4px 6px 0 0;
    }
    pre {
      overflow-x: auto;
      padding: 12px;
      border-radius: 8px;
      background: #17202a;
      color: #ecfdf5;
      font-size: 13px;
      line-height: 1.6;
    }
    .muted { color: var(--muted); }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>添加 Paper</h1>
    <p class="subtitle">先填一遍基础元数据，系统会帮你做初步分析：生成节点草稿、细化关键阅读问题、建议 graph 关系、并准备一份初始笔记模板。确认后再写入整个论文系统。</p>

    <div class="layout">
      <section class="panel">
        <form id="paperForm">
          <div class="field">
            <label for="title">短标题</label>
            <input id="title" name="title" placeholder="例如：MiniCPM-V" required>
          </div>
          <div class="field">
            <label for="fullTitle">完整标题</label>
            <input id="fullTitle" name="fullTitle" placeholder="论文完整标题" required>
          </div>
          <div class="field">
            <label for="year">年份</label>
            <input id="year" name="year" type="number" min="2000" max="2100" required>
          </div>
          <div class="field">
            <label for="area">方向</label>
            <select id="area" name="area">
              <option>VLM Foundations</option>
              <option>Visual Instruction Tuning</option>
              <option>PEFT</option>
              <option>Preference Alignment</option>
              <option>Multimodal Alignment</option>
            </select>
          </div>
          <div class="field">
            <label for="folder">归档目录</label>
            <input id="folder" name="folder" placeholder="例如：01_vlm_foundations">
          </div>
          <div class="field">
            <label for="keywords">关键词</label>
            <input id="keywords" name="keywords" placeholder="用逗号分隔，例如：vision encoder, q-former, multimodal chat">
          </div>
          <div class="field">
            <label for="coreQuestion">核心问题</label>
            <textarea id="coreQuestion" name="coreQuestion" placeholder="这篇论文到底在解决什么问题？"></textarea>
          </div>
          <div class="field">
            <label for="contribution">一句话贡献</label>
            <textarea id="contribution" name="contribution" placeholder="用一句话写最值得记住的贡献。"></textarea>
          </div>
          <div class="field">
            <label for="pdf">PDF 路径</label>
            <input id="pdf" name="pdf" placeholder="/Users/.../paper.pdf">
          </div>
          <div class="actions">
            <button class="primary" type="button" id="analyzeBtn">分析并生成草稿</button>
            <button type="button" id="applyBtn" disabled>写入系统</button>
          </div>
        </form>
      </section>

      <section class="panel" id="resultPanel">
        <p class="muted">还没有分析结果。先在左边填一遍 paper 基础信息。</p>
      </section>
    </div>
  </div>

  <script>
    const form = document.getElementById("paperForm");
    const resultPanel = document.getElementById("resultPanel");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const applyBtn = document.getElementById("applyBtn");
    let latestPayload = null;
    let latestAnalysis = null;

    function collectPayload() {
      const data = new FormData(form);
      return {
        title: (data.get("title") || "").trim(),
        fullTitle: (data.get("fullTitle") || "").trim(),
        year: Number(data.get("year") || 0),
        area: data.get("area"),
        folder: (data.get("folder") || "").trim(),
        keywords: String(data.get("keywords") || "").split(",").map(item => item.trim()).filter(Boolean),
        coreQuestion: (data.get("coreQuestion") || "").trim(),
        contribution: (data.get("contribution") || "").trim(),
        pdf: (data.get("pdf") || "").trim()
      };
    }

    function renderAnalysis(data) {
      const paper = data.paper;
      const relations = data.suggestedRelations || [];
      const questions = data.refinedQuestions || [];
      resultPanel.innerHTML = `
        <div class="card">
          <h3>节点草稿</h3>
          <p><strong>${paper.title}</strong> · ${paper.year} · ${paper.area}</p>
          <div>
            ${paper.keywords.map(keyword => `<span class="pill">${keyword}</span>`).join("")}
          </div>
          <p class="muted">note: ${data.notePath}</p>
        </div>

        <div class="card">
          <h3>关键阅读问题细化</h3>
          ${questions.map(item => `
            <div class="card">
              <h4>${item.title}</h4>
              <p>${item.prompt}</p>
              <p class="muted">关键词：${(item.keywords || []).join(" / ")}</p>
            </div>
          `).join("")}
        </div>

        <div class="card">
          <h3>Graph Link 建议</h3>
          ${relations.length ? relations.map(item => `
            <div class="card">
              <strong>${item.source}</strong> -> <strong>${item.target}</strong>
              <p>${item.type} · ${item.label}</p>
            </div>
          `).join("") : '<p class="muted">暂无建议关系，可以后续手动补充。</p>'}
        </div>

        <div class="card">
          <h3>笔记模板预览</h3>
          <pre>${escapeHtml(JSON.stringify(paper, null, 2))}</pre>
        </div>
      `;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    async function request(path, payload) {
      const res = await fetch(`http://localhost:8130${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        const body = await res.text();
        throw new Error(body || `Request failed: ${res.status}`);
      }
      return res.json();
    }

    analyzeBtn.addEventListener("click", async () => {
      const payload = collectPayload();
      latestPayload = payload;
      analyzeBtn.disabled = true;
      try {
        latestAnalysis = await request("/api/paper/analyze", payload);
        renderAnalysis(latestAnalysis);
        applyBtn.disabled = false;
      } catch (error) {
        resultPanel.innerHTML = `<div class="card"><h3>分析失败</h3><p>${error.message}</p><p class="muted">请确认本地后端已启动：./scripts/start_study_backend.sh</p></div>`;
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    applyBtn.addEventListener("click", async () => {
      if (!latestPayload) return;
      applyBtn.disabled = true;
      try {
        const result = await request("/api/paper/apply", latestPayload);
        resultPanel.innerHTML = `
          <div class="card">
            <h3>写入成功</h3>
            <p><strong>${result.paper.title}</strong> 已经加入系统。</p>
            <p class="muted">note: ${result.notePath}</p>
            <p class="muted">新增关系：${result.relationsAdded}</p>
            <p><a href="index.html">返回图谱主页</a> 后刷新即可看到新节点。</p>
          </div>
        `;
      } catch (error) {
        resultPanel.innerHTML = `<div class="card"><h3>写入失败</h3><p>${error.message}</p></div>`;
      } finally {
        applyBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
